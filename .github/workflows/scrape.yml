name: Catch Daily YouTube Vibe

# 每天北京/东京时间早上 8:00 (UTC 00:00) 自动抓取一次
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你手动随时点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch YouTube Comments
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }} # 这里将秘密喂给打工人
        run: python fetch_yt_comments.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 核心修改：追踪整个 docs 目录，包含主页和每天自动生成的子文件夹
          git add docs/
          
          # 检查是否有暂存的修改，如果有则提交并推送
          git diff --staged --quiet || (git commit -m "Auto update daily vibe calendar" && git push)
